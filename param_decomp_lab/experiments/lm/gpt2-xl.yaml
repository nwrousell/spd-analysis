pd:
  seed: 0
  n_mask_samples: 1
  ci_config:
    mode: global
    fn_type: global_shared_transformer
    hidden_dims: null
    simple_transformer_ci_cfg:
      d_model: 1024
      n_blocks: 5
      mlp_hidden_dim:
      - 4096
      attn_config:
        n_heads: 8
        max_len: 512
        rope_base: 10000.0
  sampling: continuous
  sigmoid_type: leaky_hard
  decomposition_targets:
  - module_pattern: transformer.h.*.mlp.c_fc
    C: 8192
  - module_pattern: transformer.h.*.mlp.c_proj
    C: 8192
  - module_pattern: transformer.h.*.attn.c_attn
    C: 4096
  - module_pattern: transformer.h.*.attn.c_proj
    C: 2048
  identity_decomposition_targets: null
  use_delta_component: true
  components_optimizer:
    lr_schedule:
      start_val: 5.0e-05
      warmup_pct: 0.0
      final_val_frac: 0.1
      fn_type: cosine
    grad_clip_norm: 0.01
  ci_fn_optimizer:
    lr_schedule:
      start_val: 5.0e-05
      warmup_pct: 0.0
      final_val_frac: 0.1
      fn_type: cosine
  steps: 100000
  batch_size: 64
  faithfulness_warmup_steps: 400
  faithfulness_warmup_lr: 0.001
  faithfulness_warmup_weight_decay: 0.0
  loss_metrics:
  - type: ImportanceMinimalityLoss
    coeff: 0.00001
    pnorm: 2.0
    beta: 0.5
    p_anneal_start_frac: 0.0
    p_anneal_final_p: 0.4
    p_anneal_end_frac: 1.0
    eps: 1.0e-12
  - type: StochasticReconLayerwiseLoss
    coeff: 0.5
  - type: FaithfulnessLoss
    coeff: 10000000.0
cadence:
  train_log_every: 200
eval:
  n_steps: 1
  batch_size: 128
  every: 1000
  slow_every: 10000
  slow_on_first_step: true
  metrics:
  - type: CIHistograms
    n_batches_accum: 1
  - type: ComponentActivationDensity
  - type: CI_L0
    groups: null
  - type: CEandKLLosses
    rounding_threshold: 0.0
  - type: CIMeanPerComponent
  - type: StochasticHiddenActsReconLoss
  - type: CIHiddenActsReconLoss
  - type: PGDReconLoss
    init: random
    step_size: 0.1
    n_steps: 20
    mask_scope: shared_across_batch
target:
  spec:
    kind: hf
    model_class: transformers.GPT2LMHeadModel
    model_name: openai-community/gpt2-xl
  output_extract: logits
data:
  tokenizer_name: openai-community/gpt2
  max_seq_len: 512
  buffer_size: 1000
  dataset_name: apollo-research/Skylion007-openwebtext-tokenizer-gpt2
  column_name: input_ids
  train_split: train
  eval_split: train
  shuffle_each_epoch: true
  is_tokenized: true
  streaming: true
runtime:
  autocast_bf16: true
  device: cuda
  dp: null
wandb:
  project: param-decomp
